<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventide | Events</title>
    <link rel="stylesheet" href="../style.css" />
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/"><div class="logo">Eventide</div></a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/inventory/">Inventory</a></li>
                <li><a href="/events/">Events</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="page-content">
        <section class="dashboard-section">
            <div class="container">
                <div class="dashboard-header">
                    <div>
                        <h2>Event Log</h2>
                        <p class="section-subtitle">Immutable inventory activity history</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-header">
                        <h3>Filtering</h3>
                    </div>
                    <div class="filter-row filters-with-clear">
                        <select id="event-type-filter" class="form-control">
                            <option value="">All types</option>
                            <option value="inbound">Inbound</option>
                            <option value="outbound">Outbound</option>
                            <option value="adjustment">Adjustment</option>
                            <option value="transfer">Transfer</option>
                        </select>

                        <select id="user-filter" class="form-control">
                            <option value="">All users</option>
                            <option value="zaid">Zaid</option>
                            <option value="malik">Malik</option>
                            <option value="rami">Rami</option>
                            <option value="ahmad">Ahmad</option>
                            <option value="mohammad">Mohammad</option>
                        </select>

                        <select id="warehouse-filter" class="form-control">
                            <option value="">Warehouses</option>
                            <option value="WH-WEST">WH-WEST</option>
                            <option value="WH-EAST">WH-EAST</option>
                            <option value="WH-SOUTH">WH-SOUTH</option>
                            <option value="WH-NORTH">WH-NORTH</option>
                            <option value="WH-CENTRAL">WH-CENTRAL</option>
                        </select>

                        <input id="item-sku-filter" placeholder="Item name or SKU" class="form-control" />

                        <div class="filters-clear">
                            <button id="clear-filter" class="cta-btn ghost">Clear</button>
                        </div>
                    </div>
                </div>

                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <h3>Latest Events</h3>
                        <span class="pill">Real-time</span>
                    </div>
                    <div id="events-list" class="events-container">
                        <p class="loading">Loading events...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Eventide. All rights reserved.</p>
        </div>
    </footer>
    <script src="events.js"></script>
</body>

</html>
