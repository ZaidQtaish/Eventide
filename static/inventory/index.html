<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Current Stock</title>
    <link rel="stylesheet" href="../style.css" />
</head>

<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="/"><div class="logo">Eventide</div></a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/inventory/">Inventory</a></li>
                <li><a href="/events/">Events</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="page-content">
        <section class="dashboard-section">
            <div class="container">
                <div class="dashboard-header">
                    <div>
                        <h2>Current Stock</h2>
                        <p class="section-subtitle">Live inventory across warehouses</p>
                    </div>
                    <div class="dashboard-header-actions">
                        <button id="open-create-event-modal" class="cta-btn primary" type="button">Record Event</button>
                    </div>
                </div>

                <!-- Filtering -->
                <div class="panel">
                    <div class="panel-header">
                        <h3>Filtering</h3>
                    </div>
                    <div class="filter-row filters-with-clear">
                        <select id="warehouse-filter" class="form-control">
                            <option value="">All Warehouses</option>
                            <option value="WH-WEST">WH-WEST</option>
                            <option value="WH-EAST">WH-EAST</option>
                            <option value="WH-SOUTH">WH-SOUTH</option>
                            <option value="WH-NORTH">WH-NORTH</option>
                            <option value="WH-CENTRAL">WH-CENTRAL</option>
                        </select>
                        <input id="item-sku-filter" class="form-control" type="search"
                            placeholder="Search by item or SKU" />
                        <div class="filters-clear">
                            <button id="clear-filter" class="cta-btn ghost">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- Current Stock List -->
                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <h3>Current Stock</h3>
                        <span class="pill">Live</span>
                    </div>

                    <div id="snapshots-list" class="events-container">
                        <p class="loading">Loading stock...</p>
                    </div>
                    <div class="pagination-bar">
                        <button id="inventory-prev-page" class="cta-btn ghost pagination-btn" type="button">Prev</button>
                        <span id="inventory-page-info" class="pagination-info">Page 1 of 1</span>
                        <button id="inventory-next-page" class="cta-btn ghost pagination-btn" type="button">Next</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Eventide. All rights reserved.</p>
        </div>
    </footer>

    <script src="../events/create-event-modal.js"></script>
    <script src="inventory.js"></script>
    <script>
        (() => {
            if (!window.EventideCreateEventModal || typeof window.EventideCreateEventModal.mount !== 'function') {
                return;
            }
            window.EventideCreateEventModal.mount({
                openButtonSelector: '#open-create-event-modal',
            });
        })();
    </script>
</body>

</html>
