<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Eventide | Sign In</title>
	<link rel="stylesheet" href="../style.css">
</head>
<body class="auth-page">
	<div class="auth-wrapper">
		<div class="auth-card">
			<div class="auth-header">
				<div class="auth-logo">Eventide</div>
				<div class="auth-title">Welcome back</div>
				<p class="auth-subtitle">Sign in to access your dashboard</p>
			</div>

			<form>
				<div class="form-group">
					<label for="username">Username</label>
					<input class="form-control" type="text" id="username" name="username" placeholder="Enter your username" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
				</div>

				<div class="auth-actions">
					<a class="text-link" href="#">Forgot password?</a>
				</div>

				<div id="auth-message" class="auth-message" role="status" aria-live="polite"></div>

				<button type="submit" class="cta-btn primary">Sign In</button>
			</form>

			<div class="auth-footer">
				Having trouble? Contact your administrator.
			</div>
		</div>
	</div>
	<script src="login.js"></script>
</body>
</html>
